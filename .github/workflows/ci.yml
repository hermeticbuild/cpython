name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  configure-audit:
    name: Configure audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check configure audit
        run: tools/configure_check_audit.sh --check

      - name: Check duplicate Python version requests
        working-directory: tests/duplicate_version_requests
        run: bazel query --lockfile_mode=error 'set(@python_requester//:python3_13 @python3_14//:python)'

  test:
    name: ${{ matrix.system.name }} / CPython ${{ matrix.python.version }}
    runs-on: ${{ matrix.system.runner }}
    strategy:
      fail-fast: false
      matrix:
        python:
          - repository: python3_11
            version: "3.11"
          - repository: python3_12
            version: "3.12"
          - repository: python3_13
            version: "3.13"
          - repository: python3_14
            version: "3.14"
        system:
          - name: Linux x86_64
            runner: ubuntu-24.04
            platform: "@llvm//platforms:linux_x86_64"
            remote: true
            bazel_sh: /bin/bash
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            platform: "@llvm//platforms:linux_aarch64"
            remote: true
            bazel_sh: /bin/bash
          - name: macOS x86_64
            runner: macos-15-intel
            platform: "@llvm//platforms:macos_x86_64"
            remote: true
            bazel_sh: /bin/bash
          - name: macOS arm64
            runner: macos-15
            platform: "@llvm//platforms:macos_aarch64"
            remote: true
            bazel_sh: /bin/bash
          - name: Windows x86_64
            runner: windows-2025
            platform: "@llvm//platforms:windows_x86_64_msvc"
            remote: false
            bazel_sh: C:\Program Files\Git\bin\bash.exe
          - name: Windows arm64
            runner: windows-11-arm
            platform: "@llvm//platforms:windows_aarch64_msvc"
            remote: false
            bazel_sh: C:\Program Files\Git\bin\bash.exe

    env:
      BAZEL_SH: ${{ matrix.system.bazel_sh }}

    steps:
      - uses: actions/checkout@v4

      - name: Test CPython repositories
        shell: bash
        run: |
          bazel_args=(--config=ci)
          if [[ "${{ matrix.system.remote }}" == "true" ]]; then
            bazel_args+=(
              --config=remote
              --jobs=64
              "--extra_execution_platforms=@cpython//:rbe_platform,${{ matrix.system.platform }}"
            )
          else
            bazel_args+=(
              --jobs=4
              "--extra_execution_platforms=${{ matrix.system.platform }}"
            )
          fi
          bazel_args+=(
            --local_test_jobs=4
            "--platforms=${{ matrix.system.platform }}"
            --strategy=TestRunner=local
          )
          bazel test "${bazel_args[@]}" "@${{ matrix.python.repository }}//..."
